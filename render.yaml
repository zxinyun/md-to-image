services:
  - type: web
    name: md-to-image
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BASE_URL
        value: https://md-to-image.onrender.com
      - key: CHROME_PATH
        value: /usr/bin/google-chrome-unstable
    healthCheckPath: /api/hello
    autoDeploy: true 
